<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dein kleiner AI-Roboter</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="app-shell">
        <div class="app-inner">
            <header class="header">
                <div class="robot-avatar" aria-hidden="true">
                    <div class="robot-antenna"></div>
                    <div class="robot-face">
                        <div class="robot-eye"></div>
                        <div class="robot-eye"></div>
                        <div class="robot-mouth"></div>
                    </div>
                </div>
                <div class="header-text">
                    <h1>Hallo, ich bin Yannick dein kleiner Roboter 🤖</h1>
                    <p>Stell mir eine Frage </p>
                </div>
            </header>

            <section class="chat-card">
                <form id="question-form">
                    <div class="form-row">
                        <label for="question">Deine Frage</label>
                        <div class="input-group">
                            <input type="text" id="question" name="question" placeholder="Frag mich alles – z.B. ‚Erkläre mir Quantenphysik einfach‘" required />
                            <button type="submit">
                                <span class="icon">➤</span>
                                <span>Senden</span>
                            </button>
                        </div>
                    </div>
                </form>

                <div class="answer-block">
                    <div class="answer-label">
                        <span class="answer-label-dot"></span>
                        <span>Antwort der AI</span>
                    </div>
                    <div id="answer" class="answer-empty">
                        Noch keine Antwort. Schreib oben deine erste Frage.
                    </div>
                </div>

                <div id="spinner" class="spinner hidden" aria-hidden="true"></div>
            </section>
        </div>
    </main>

    <script>
        const form = document.getElementById('question-form');
        const input = document.getElementById('question');
        const answerEl = document.getElementById('answer');
        const spinner = document.getElementById('spinner');

        form.addEventListener('submit', async (event) => {
            event.preventDefault(); // verhindert GET
            const question = (input.value || '').trim();
            if (!question) return;

            answerEl.className = 'answer-empty';
            answerEl.textContent = 'Die AI denkt nach...';
            spinner.classList.remove('hidden');

            try {
                const response = await fetch('https://yannickvaterlaus.pythonanywhere.com/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();

                if (!response.ok || data.error) {
                    answerEl.className = 'answer-empty';
                    answerEl.textContent = data.error || 'Es ist ein Fehler aufgetreten.';
                    return;
                }

                answerEl.className = 'answer-text';
                answerEl.textContent = data.answer || 'Keine Antwort erhalten.';
            } catch (error) {
                answerEl.className = 'answer-empty';
                answerEl.textContent = 'Netzwerkfehler: Konnte den Server nicht erreichen.';
            } finally {
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
